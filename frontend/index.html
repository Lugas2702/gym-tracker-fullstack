<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gym Tracker</title>
    <style>
        :root { --bg-main: #121212; --bg-card: #1e1e1e; --accent: #00e676; --text-main: #ffffff; --text-muted: #a0a0a0; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 2.5rem; text-transform: uppercase; }
        .header p { color: var(--text-muted); margin-top: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card h2 { margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 1.2rem; }
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid var(--accent); }
        .stat-box h3 { margin: 0; font-size: 2rem; color: var(--accent); }
        .stat-box p { margin: 5px 0 0; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent); }
        button { width: 100%; padding: 15px; background-color: var(--accent); color: #000; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #00c853; }
        .workout-list { list-style: none; padding: 0; margin: 0; }
        .workout-item { background: #2a2a2a; margin-bottom: 15px; padding: 15px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .workout-info h4 { margin: 0; font-size: 1.2rem; color: var(--accent); }
        .workout-info p { margin: 5px 0 0; color: var(--text-muted); font-size: 0.9rem; }
        .delete-btn { background: #ff5252; color: white; width: auto; padding: 8px 15px; font-size: 0.9rem; }
        .delete-btn:hover { background: #ff1744; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ Pro Gym Tracker</h1>
        <p>Monitor progres angkatanmu dan hancurkan limitmu!</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>➕ Catat Latihan Baru</h2>
            <form id="workoutForm">
                <div class="form-group">
                    <label>Nama Latihan</label>
                    <input type="text" id="nama" placeholder="Contoh: Deadlift" required>
                </div>
                <div class="form-group">
                    <label>Beban (Kg)</label>
                    <input type="number" id="beban" placeholder="Contoh: 60" required>
                </div>
                <div class="form-group">
                    <label>Jumlah Set</label>
                    <input type="number" id="set" placeholder="Contoh: 4" required>
                </div>
                <div class="form-group">
                    <label>Jumlah Repetisi</label>
                    <input type="number" id="reps" placeholder="Contoh: 8" required>
                </div>
                <button type="submit">SIMPAN DATA</button>
            </form>
        </div>

        <div class="card">
            <div class="stats-container">
                <div class="stat-box">
                    <h3 id="totalLatihan">0</h3>
                    <p>Total Sesi</p>
                </div>
                <div class="stat-box" id="konsistensiBox">
                    <h3 id="ikonKonsistensi">⏳</h3>
                    <p id="teksKonsistensi">Belum Ada Data</p>
                </div>
            </div>

            <h2>📋 Riwayat Latihan Terakhir</h2>
            <ul class="workout-list" id="workoutList"></ul>
        </div>
    </div>

    <script>
        const workoutForm = document.getElementById('workoutForm');
        const workoutList = document.getElementById('workoutList');
        const totalLatihanText = document.getElementById('totalLatihan');
        const ikonKonsistensi = document.getElementById('ikonKonsistensi');
        const teksKonsistensi = document.getElementById('teksKonsistensi');

const API_URL = 'https://gym-tracker-backend-api.vercel.app/api/workouts';

        async function fetchWorkouts() {
            try {
                const res = await fetch(API_URL);
                const workouts = await res.json();
                
                workoutList.innerHTML = '';
                totalLatihanText.innerText = workouts.length;

                // Logika Status Konsistensi
                if (workouts.length > 0) {
                    const lastWorkoutDate = new Date(workouts[0].tanggal);
                    const today = new Date();
                    const diffTime = Math.abs(today - lastWorkoutDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                    if (diffDays <= 3) {
                        ikonKonsistensi.innerText = "🔥";
                        teksKonsistensi.innerText = "On Fire!";
                        document.getElementById('konsistensiBox').style.borderLeftColor = "#ff5252";
                    } else {
                        ikonKonsistensi.innerText = "🧊";
                        teksKonsistensi.innerText = "Kurang Aktif";
                        document.getElementById('konsistensiBox').style.borderLeftColor = "#00bcd4";
                    }
                }

                workouts.forEach(workout => {
                    const li = document.createElement('li');
                    li.className = 'workout-item';
                    
                    // Kita format tampilan tanggalnya agar rapi
                    const tgl = new Date(workout.tanggal).toLocaleDateString('id-ID');

                    // Beban kita tampilkan atau beri nilai default 0 jika data lama tidak punya beban
                    const beban = workout.beban || 0; 

                    li.innerHTML = `
                        <div class="workout-info">
                            <h4>${workout.nama} &nbsp; <span style="font-size:0.9rem; color:#fff; background:#444; padding:2px 8px; border-radius:4px;">${beban} Kg</span></h4>
                            <p>${workout.set} Set x ${workout.reps} Reps &nbsp;|&nbsp; 🗓️ ${tgl}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteWorkout('${workout._id}')">Hapus</button>
                    `;
                    workoutList.appendChild(li);
                });
            } catch (err) {
                console.error('Error:', err);
            }
        }

        workoutForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value;
            const beban = document.getElementById('beban').value;
            const set = document.getElementById('set').value;
            const reps = document.getElementById('reps').value;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nama, beban, set, reps })
            });

            workoutForm.reset();
            fetchWorkouts();
        });

        async function deleteWorkout(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchWorkouts();
        }

        fetchWorkouts();
    </script>
</body>
</html>
